name: Security Audit
on:
    pull_request:
jobs:
    dependency-review:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        steps:
            - name: Checkout 🛎️
              uses: actions/checkout@v6

            - name: Dependency Review 🔍
              uses: actions/dependency-review-action@v4
              with:
                  fail-on-severity: high
                  comment-summary-in-pr: always
